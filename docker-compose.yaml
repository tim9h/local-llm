services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    devices:
      - nvidia.com/gpu=all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

  chatterbox:
    image: travisvn/chatterbox-tts-api:latest
    container_name: chatterbox
    ports:
      - "8004:5123"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - API_PORT=5123
    devices:
      - nvidia.com/gpu=all
    volumes:
      - ./chatterbox_voices:/app/voices
    restart: unless-stopped

  spring-ai-backend:
    build: .
    container_name: spring-ai-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434
      - CHATTERBOX_URL=http://chatterbox:5123
      - JAVA_OPTS=--enable-native-access=ALL-UNNAMED
    depends_on:
      - ollama
      - chatterbox

volumes:
  ollama_storage: