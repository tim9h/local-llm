services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    devices:
      - nvidia.com/gpu=all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

  chatterbox:
    image: travisvn/chatterbox-tts-api:latest
    container_name: chatterbox
    ports:
      - "8004:5123"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PORT=5123
      - CFG_WEIGHT=0.3
    devices:
      - nvidia.com/gpu=all
    volumes:
      - ./chatterbox_voices/glados.wav:/app/voice-sample.mp3:ro
      - ./chatterbox_voices:/app/voices
      - chatterbox_cache:/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 1s bash -c '< /dev/tcp/localhost/5123' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s

  spring-ai-backend:
    build: .
    container_name: spring-ai-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434
      - CHATTERBOX_URL=http://chatterbox:5123
      - JAVA_OPTS=--enable-native-access=ALL-UNNAMED
    depends_on:
      chatterbox:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  ollama_storage:
  chatterbox_cache: